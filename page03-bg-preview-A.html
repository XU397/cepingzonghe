<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案A - 左右分栏式</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: #f8f9fa;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 60px 80px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 42px;
      font-weight: bold;
      color: #2e5c4f;
      margin-bottom: 40px;
      text-align: left;
    }

    .mainLayout {
      display: flex;
      gap: 60px;
      align-items: flex-start;
    }

    .textSection {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .sectionTitle {
      font-size: 24px;
      color: #2e5c4f;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon {
      font-size: 28px;
    }

    .description {
      font-size: 17px;
      line-height: 2;
      color: #333;
      text-align: justify;
      text-indent: 2em;
    }

    .highlightBox {
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8f4 100%);
      border-left: 4px solid #4caf50;
      padding: 24px 28px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(76, 175, 80, 0.1);
    }

    .highlightTitle {
      font-size: 20px;
      color: #2e7d32;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .highlightText {
      font-size: 16px;
      line-height: 1.9;
      color: #424242;
      margin: 0;
    }

    .imageSection {
      flex: 0 0 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .imageWrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      transition: transform 0.3s ease;
    }

    .imageWrapper:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }

    .pvImage {
      width: 100%;
      height: auto;
      display: block;
    }

    .imageBadge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(46, 92, 79, 0.95);
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }

    .imageLabel {
      text-align: center;
      color: #666;
      font-size: 15px;
      margin-top: 8px;
    }

    .countdown {
      text-align: center;
      margin-top: 30px;
      color: #666;
      font-size: 16px;
      padding: 12px;
      background: #fff3e0;
      border-radius: 8px;
      border: 1px dashed #ff9800;
    }

    .badge {
      display: inline-block;
      position: absolute;
      top: 20px;
      left: 20px;
      background: #2e5c4f;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">光伏治沙</h1>

    <div class="mainLayout">
      <!-- 左侧文字区域 -->
      <div class="textSection">
        <div>
          <h2 class="sectionTitle">
            <span class="icon">🌍</span>
            项目背景
          </h2>
          <p class="description">
            2024年11月，中国库布齐沙漠通过"光伏项目"成功使6000多平方公里沙漠变为"能源绿洲"。这一成就引发了同学们的思考：光伏板为何能有效减少水分蒸发，以实现保水治沙？他们推测，改变地表风速可能是关键机制。为此，同学们设计了一项实地观测研究，以探究光伏板对风速的影响。
          </p>
        </div>

        <div class="highlightBox">
          <h3 class="highlightTitle">
            <span class="icon">💡</span>
            研究假设
          </h3>
          <p class="highlightText">
            <strong>改变地表风速可能是关键机制</strong> —— 光伏板通过影响风速，减少沙漠表面水分蒸发，从而实现保水治沙的效果。同学们将通过实地观测来验证这一假设。
          </p>
        </div>
      </div>

      <!-- 右侧图片区域 -->
      <div class="imageSection">
        <div class="imageWrapper">
          <div class="badge">方案A</div>
          <img
            src="https://via.placeholder.com/480x320/2e5c4f/ffffff?text=光伏治沙项目"
            alt="光伏治沙项目示意图"
            class="pvImage"
          />
          <span class="imageBadge">库布齐沙漠光伏项目</span>
        </div>
        <p class="imageLabel">图：光伏板覆盖下的沙漠景观</p>
      </div>
    </div>

    <div class="countdown">
      ⏱️ 请仔细阅读... 5s
    </div>
  </div>
</body>
</html>

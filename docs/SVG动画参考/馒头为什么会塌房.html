<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烘焙大侦探：馒头塌陷之谜</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts (ZCOOL KuaiLe - 可爱的中文圆体) -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <!-- 引入 Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FFF8E1; /* 奶黄色背景 */
            background-image: radial-gradient(#FFE0B2 2px, transparent 2px);
            background-size: 30px 30px;
        }
        
        .font-cartoon {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .comic-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }
        
        .comic-shadow:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,0.2);
        }

        .bubble-tip {
            position: relative;
            background: #fff;
            border-radius: .4em;
        }

        .bubble-tip:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 0;
            border: 12px solid transparent;
            border-top-color: #fff;
            border-bottom: 0;
            margin-left: -12px;
            margin-bottom: -12px;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #FFF8E1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #FFB74D; 
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-8 px-4 text-slate-800">

    <!-- 主容器 -->
    <main class="w-full max-w-2xl bg-white rounded-3xl border-4 border-orange-300 overflow-hidden shadow-2xl relative">
        
        <!-- 装饰背景元素 -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-yellow-200 rounded-full opacity-50 blur-xl"></div>
        <div class="absolute top-40 -left-10 w-24 h-24 bg-green-200 rounded-full opacity-50 blur-xl"></div>

        <!-- 顶部：标题栏 -->
        <header class="bg-orange-400 p-4 text-center relative z-10 border-b-4 border-orange-200">
            <div class="inline-block bg-white px-3 py-0.5 rounded-full text-orange-500 font-bold text-xs mb-1 shadow-sm transform -rotate-2">
                Q&A 烘焙小剧场
            </div>
            <h1 class="text-2xl md:text-3xl text-white font-cartoon tracking-wider drop-shadow-md">
                馒头为什么会"塌房"？
            </h1>
        </header>

        <!-- 内容区域 -->
        <div class="p-5 md:p-6 space-y-5 relative z-10">

            <!-- 提问卡片 -->
            <section class="flex flex-col md:flex-row gap-3 items-start animate-fade-in-up">
                <!-- 头像 -->
                <div class="flex-shrink-0 flex flex-col items-center">
                    <div class="w-12 h-12 md:w-14 md:h-14 bg-blue-100 rounded-full border-2 border-blue-300 flex items-center justify-center text-2xl shadow-md overflow-hidden">
                        🤔
                    </div>
                    <span class="mt-1 text-[10px] font-bold text-blue-400 bg-blue-50 px-1.5 rounded-full">烘焙新手</span>
                </div>
                
                <!-- 气泡 -->
                <div class="flex-1 bg-blue-50 border-2 border-blue-200 rounded-xl rounded-tl-none p-4 comic-shadow relative">
                    <div class="flex justify-between items-start mb-1">
                        <h2 class="font-bold text-base text-slate-700">紧急求助！</h2>
                        <div class="flex items-center bg-yellow-100 text-yellow-600 px-1.5 py-0.5 rounded text-[10px] font-bold border border-yellow-200">
                            <i class="ph-fill ph-coin mr-1"></i> 悬赏 5 金币
                        </div>
                    </div>
                    <p class="text-slate-600 leading-snug font-medium text-sm">
                        我做馒头时，面团<span class="text-blue-500 font-bold">膨胀得特别大</span>，还<span class="text-blue-500 font-bold">软塌塌</span>的，这是怎么回事呢？😰
                    </p>
                    
                    <!-- 互动按钮 -->
                    <div class="mt-3 flex gap-3 border-t border-blue-100 pt-2">
                        <button class="flex items-center text-[10px] font-bold text-blue-400 hover:text-blue-600 transition-colors">
                            <i class="ph-bold ph-pencil-simple mr-1"></i> 我来答
                        </button>
                        <button class="flex items-center text-[10px] font-bold text-blue-400 hover:text-blue-600 transition-colors">
                            <i class="ph-bold ph-share-network mr-1"></i> 分享
                        </button>
                    </div>
                </div>
            </section>

            <!-- 连接线 -->
            <div class="flex justify-center -my-3 opacity-20">
                <i class="ph-fill ph-dots-three-vertical text-xl text-slate-400"></i>
            </div>

            <!-- 回答卡片 -->
            <section class="flex flex-col md:flex-row gap-3 items-start">
                
                <!-- 气泡 (放在左侧/主要位置) -->
                <div class="flex-1 order-2 md:order-1 bg-green-50 border-2 border-green-200 rounded-xl rounded-tr-none p-4 comic-shadow">
                    
                    <!-- 答主信息 -->
                    <div class="flex items-center gap-2 mb-3 border-b border-green-200 pb-2">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="font-cartoon text-base text-green-800">光明烘焙中心李师傅</span>
                                <span class="bg-green-200 text-green-700 text-[10px] px-1 py-0.5 rounded font-bold">高粉答主</span>
                            </div>
                            <p class="text-[10px] text-green-600">2023-10-22 · 每个回答都超有用✨</p>
                        </div>
                        <button class="bg-green-500 hover:bg-green-600 text-white text-[10px] font-bold px-2 py-1 rounded-full shadow-sm transition-colors">
                            + 关注
                        </button>
                    </div>

                    <!-- 回答核心内容 (紧凑排版) -->
                    <div class="space-y-2 text-sm text-slate-700 font-medium leading-relaxed">
                        <p>
                            这可能和多种因素有关，比如你的<span class="bg-yellow-200 px-1 rounded font-bold text-orange-700">发酵时间</span>。
                        </p>
                        
                        <!-- 逻辑链条 (横向布局节省空间，把原话转化成图示) -->
                        <div class="bg-white/60 rounded-lg p-2 border border-green-100 flex items-center justify-between text-xs font-cartoon text-slate-600 my-1">
                            <div class="text-center w-1/4">
                                <div class="text-orange-500 text-base">⏰</div>
                                <div>时间越长</div>
                            </div>
                            <i class="ph-bold ph-arrow-right text-green-400"></i>
                            <div class="text-center w-1/4">
                                <div class="text-blue-500 text-base">💨</div>
                                <div>气体越多</div>
                            </div>
                            <i class="ph-bold ph-arrow-right text-green-400"></i>
                            <div class="text-center w-1/4">
                                <div class="text-purple-500 text-base">🕸️</div>
                                <div>面筋断裂</div>
                            </div>
                        </div>

                        <p>
                            导致面团塌陷。当然，也要看其它条件，如<span class="border-b-2 border-green-300 font-bold">温度</span>、<span class="border-b-2 border-green-300 font-bold">湿度</span>等是否合适。🌡️
                        </p>
                    </div>
                </div>

                <!-- 答主头像 (放在右侧/次要位置) -->
                <div class="flex-shrink-0 order-1 md:order-2 flex flex-col items-center">
                    <div class="w-12 h-12 md:w-14 md:h-14 bg-white rounded-full border-2 border-green-300 p-1 shadow-md">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=MasterChef&clothing=graphicShirt&top=hat&accessories=glasses" alt="李师傅" class="w-full h-full rounded-full bg-green-50">
                    </div>
                    <span class="mt-1 text-[10px] font-bold text-green-600 bg-green-50 px-1.5 rounded-full">专业解答</span>
                </div>

            </section>
        </div>

        <!-- 底部装饰 -->
        <footer class="bg-orange-50 p-4 text-center border-t border-orange-100">
            <p class="text-xs text-orange-400 font-cartoon">
                🍞 烘焙不仅是烹饪，更是一场有趣的科学实验！
            </p>
        </footer>
    </main>

    <script>
        // 简单的入场动画
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('main');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                container.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>

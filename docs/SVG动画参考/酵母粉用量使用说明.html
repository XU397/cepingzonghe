<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酵母粉建议用量说明</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 保持一致的字体和背景 */
        @import url('https://fonts.googleapis.com/css2?family=Zcool+KuaiLe&family=Nunito:wght@700&display=swap');

        body {
            font-family: 'Nunito', 'Zcool KuaiLe', sans-serif;
            background-color: #fff9f2;
        }

        /* 动画定义 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        @keyframes pulse-scale {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-pulse-scale { animation: pulse-scale 2s ease-in-out infinite; }

        /* 卡通风格样式 */
        .cartoon-box {
            background-color: white;
            border: 4px solid black;
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,0.1);
        }

        .cartoon-stroke {
            stroke: #000;
            stroke-width: 3px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .cartoon-text {
            text-shadow: 2px 2px 0px #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; 
        }

        /* 虚线框风格 */
        .dashed-box {
            background-color: #f0f9ff;
            border: 3px dashed #3b82f6;
            border-radius: 1rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full cartoon-box p-6 md:p-10 relative overflow-hidden">
        
        <!-- 装饰性背景元素 -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-yellow-100 rounded-full opacity-50 z-0"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-100 rounded-full opacity-50 z-0"></div>

        <div class="relative z-10">
            
            <h1 class="text-2xl md:text-3xl font-bold text-center mb-8 text-gray-800 tracking-wider">
                📝 酵母粉建议用量说明
            </h1>

            <!-- 1. 文字说明区域 -->
            <div class="dashed-box p-6 mb-8 bg-blue-50/50 border-blue-300 text-gray-700 text-sm md:text-base leading-relaxed text-justify">
                <p class="mb-2">
                    <span class="font-bold text-blue-600">发酵速度</span>受酵母菌多少影响。在一定范围内，酵母菌越多，发酵速度越快，产生的二氧化碳越多。
                </p>
                <p>
                    ⚠️ 但当酵母菌<span class="font-bold text-red-500">过多时</span>，产生的二氧化碳会使面团体积过度膨胀，甚至破坏面团的形状和结构。
                </p>
            </div>

            <!-- 2. 黄金比例公式 -->
            <div class="flex justify-center mb-10">
                <div class="bg-yellow-50 border-4 border-yellow-400 rounded-2xl p-4 md:p-6 shadow-[4px_4px_0px_0px_rgba(250,204,21,1)] transform rotate-1 hover:rotate-0 transition-transform duration-300 cursor-pointer animate-pulse-scale">
                    <h2 class="text-xl md:text-3xl font-black text-orange-600 text-center cartoon-text">
                        酵母粉用量 = 面粉量 × 1%
                    </h2>
                </div>
            </div>

            <!-- 3. 可视化配方示例 -->
            <div class="border-4 border-blue-400 rounded-3xl p-6 bg-white relative">
                <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-blue-500 text-white px-6 py-1 rounded-full font-bold border-2 border-black text-sm md:text-base whitespace-nowrap">
                    ⚖️ 酵母粉用量示例
                </div>

                <div class="mt-6 flex flex-wrap items-end justify-center gap-4 md:gap-2">
                    
                    <!-- 面粉 -->
                    <div class="flex flex-col items-center group w-24 md:w-32">
                        <div class="w-20 h-20 md:w-24 md:h-24 animate-float" style="animation-delay: 0s;">
                            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-sm">
                                <!-- Bowl -->
                                <path d="M10,55 Q10,90 50,90 Q90,90 90,55" fill="#d4a373" class="cartoon-stroke" />
                                <path d="M10,55 L90,55" fill="none" class="cartoon-stroke" />
                                <!-- Flour Mound -->
                                <path d="M15,55 Q50,25 85,55" fill="#fff" class="cartoon-stroke" />
                            </svg>
                        </div>
                        <div class="text-center mt-2">
                            <div class="font-black text-lg md:text-xl">100g</div>
                            <div class="text-gray-500 text-sm font-bold">面粉</div>
                        </div>
                    </div>

                    <!-- Plus Sign -->
                    <div class="text-3xl md:text-4xl font-black text-gray-400 mb-8">+</div>

                    <!-- 酵母 -->
                    <div class="flex flex-col items-center group w-24 md:w-32">
                        <div class="w-20 h-20 md:w-24 md:h-24 animate-float" style="animation-delay: 0.5s;">
                            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-sm">
                                <!-- Spoon handle -->
                                <path d="M70,80 L90,20" stroke="#9ca3af" stroke-width="8" stroke-linecap="round" />
                                <path d="M70,80 L90,20" stroke="#fff" stroke-width="4" stroke-linecap="round" />
                                <!-- Spoon bowl -->
                                <ellipse cx="40" cy="70" rx="25" ry="15" fill="#e5e7eb" class="cartoon-stroke" transform="rotate(-20 40 70)" />
                                <!-- Yeast Powder -->
                                <ellipse cx="40" cy="68" rx="18" ry="8" fill="#fef3c7" transform="rotate(-20 40 68)" />
                                <circle cx="35" cy="65" r="1" fill="#d97706"/>
                                <circle cx="45" cy="68" r="1" fill="#d97706"/>
                                <circle cx="40" cy="70" r="1" fill="#d97706"/>
                            </svg>
                        </div>
                        <div class="text-center mt-2">
                            <div class="font-black text-lg md:text-xl">1g</div>
                            <div class="text-gray-500 text-sm font-bold">酵母粉</div>
                        </div>
                    </div>

                    <!-- Plus Sign -->
                    <div class="text-3xl md:text-4xl font-black text-gray-400 mb-8">+</div>

                    <!-- 水 -->
                    <div class="flex flex-col items-center group w-24 md:w-32">
                        <div class="w-20 h-20 md:w-24 md:h-24 animate-float" style="animation-delay: 1s;">
                            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-sm">
                                <!-- Glass -->
                                <path d="M25,20 L30,85 Q30,90 50,90 Q70,90 70,85 L75,20" fill="#e0f2fe" class="cartoon-stroke" />
                                <ellipse cx="50" cy="20" rx="25" ry="5" fill="#e0f2fe" class="cartoon-stroke" />
                                <!-- Water Level -->
                                <path d="M26,30 L29,80 Q29,84 50,84 Q71,84 71,80 L74,30" fill="#bfdbfe" stroke="none" />
                                <ellipse cx="50" cy="30" rx="24" ry="4" fill="#60a5fa" opacity="0.5" />
                                <!-- Reflection -->
                                <path d="M32,30 L32,80" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.5" />
                            </svg>
                        </div>
                        <div class="text-center mt-2">
                            <div class="font-black text-lg md:text-xl">100g</div>
                            <div class="text-gray-500 text-sm font-bold">水</div>
                        </div>
                    </div>

                    <!-- Equals Sign -->
                    <div class="text-3xl md:text-4xl font-black text-gray-400 mb-8">=</div>

                    <!-- 面团 (结果) -->
                    <div class="flex flex-col items-center group w-28 md:w-36">
                        <div class="w-24 h-24 md:w-28 md:h-28 animate-pulse-scale" style="animation-delay: 1.5s;">
                            <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                                <!-- Dough Ball -->
                                <path d="M15,60 Q15,20 50,20 Q85,20 85,60 Q85,85 50,85 Q15,85 15,60 Z" fill="#fef3c7" class="cartoon-stroke" />
                                <!-- Shine -->
                                <ellipse cx="35" cy="35" rx="10" ry="5" fill="#fff" opacity="0.6" transform="rotate(-30 35 35)" />
                                <!-- Shadow -->
                                <path d="M25,75 Q50,80 75,75" stroke="#000" stroke-width="2" opacity="0.1" fill="none"/>
                            </svg>
                        </div>
                        <div class="text-center mt-2">
                            <div class="font-black text-lg md:text-xl text-blue-600">约200g</div>
                            <div class="text-gray-500 text-sm font-bold">面团</div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</body>
</html>

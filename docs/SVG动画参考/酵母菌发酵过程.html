<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酵母菌发酵过程 - 可视化演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zcool+KuaiLe&family=Nunito:wght@700&display=swap');

        body {
            font-family: 'Nunito', 'Zcool KuaiLe', sans-serif;
            background-color: #fff9f2;
        }

        /* 动画定义 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        @keyframes bubbles {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-20px) scale(0); opacity: 0; }
        }

        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-wobble { animation: wobble 4s ease-in-out infinite; }
        
        .bubble {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: bubbles 2s infinite;
        }

        /* 卡通描边风格 */
        .cartoon-stroke {
            stroke: #000;
            stroke-width: 3px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        .cartoon-text {
            text-shadow: 2px 2px 0px #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; 
        }

        /* 响应式调整 */
        .process-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2rem;
        }
        
        @media (max-width: 768px) {
            .process-container {
                flex-direction: column;
            }
            .arrow-container {
                transform: rotate(90deg);
                margin: 1rem 0;
            }
            .arrow-text {
                transform: rotate(-90deg);
                position: absolute;
                left: -60px;
                top: 50%;
                width: 100px;
                text-align: right;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-5xl w-full bg-white rounded-[3rem] p-8 md:p-12 shadow-[8px_8px_0px_0px_rgba(0,0,0,0.1)] border-4 border-black">
        
        <h1 class="text-3xl md:text-4xl font-bold text-center mb-12 text-gray-800 tracking-wider">
            酵母菌发酵过程
        </h1>

        <div class="process-container">
            
            <!-- 1. 糖类物质 (Sugar) -->
            <div class="flex flex-col items-center group cursor-pointer">
                <div class="relative w-40 h-48 transition-transform transform group-hover:scale-105">
                    <!-- Sugar Bag SVG -->
                    <svg viewBox="0 0 100 120" class="w-full h-full drop-shadow-xl">
                        <path d="M15,110 C15,115 85,115 85,110 L90,30 C90,25 10,25 10,30 Z" fill="#fff" class="cartoon-stroke"/>
                        <path d="M12,40 L88,40" class="cartoon-stroke" fill="none"/> <!-- Top crease -->
                        <!-- Label Box -->
                        <rect x="20" y="55" width="60" height="25" fill="#fff" class="cartoon-stroke" />
                        <text x="50" y="73" text-anchor="middle" font-size="14" font-weight="900" font-family="Nunito">SUGAR</text>
                        <!-- Little curve at bottom -->
                        <path d="M30,100 Q50,105 70,100" fill="none" class="cartoon-stroke" stroke-width="2"/>
                    </svg>
                </div>
                <h2 class="mt-4 text-xl md:text-2xl font-bold text-gray-900 cartoon-text">糖类物质</h2>
            </div>

            <!-- Arrow & Yeast -->
            <div class="arrow-container relative flex flex-col items-center justify-center mx-4">
                <span class="arrow-text text-xl md:text-2xl font-bold mb-2 text-gray-900 cartoon-text whitespace-nowrap md:absolute md:-top-10">酵母菌</span>
                <svg width="120" height="60" viewBox="0 0 120 60" class="animate-pulse">
                    <path d="M10,20 L70,20 L70,10 L110,30 L70,50 L70,40 L10,40 Z" fill="#1a1a1a" stroke="none" />
                </svg>
            </div>

            <!-- Result Group -->
            <div class="flex items-center gap-4 md:gap-8 flex-wrap justify-center bg-yellow-50/50 p-6 rounded-3xl border-2 border-dashed border-yellow-200">
                
                <!-- CO2 Cloud -->
                <div class="flex flex-col items-center animate-float" style="animation-delay: 0s;">
                    <div class="w-32 h-32 relative">
                        <!-- Cloud SVG -->
                        <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                            <path d="M25,65 Q10,65 10,50 Q10,35 25,30 Q30,10 50,10 Q70,10 75,30 Q90,35 90,50 Q90,65 75,65 Z" fill="#fff" class="cartoon-stroke"/>
                            <!-- Face -->
                            <circle cx="35" cy="45" r="3" fill="#000"/>
                            <circle cx="65" cy="45" r="3" fill="#000"/>
                            <path d="M45,52 Q50,57 55,52" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h2 class="mt-2 text-lg md:text-xl font-bold text-gray-900 cartoon-text text-center">二氧化碳<br>气体</h2>
                </div>

                <!-- Plus Sign -->
                <div class="w-12 h-12 flex items-center justify-center bg-green-500 rounded-full border-4 border-black text-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transform hover:rotate-90 transition-transform duration-300">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </div>

                <!-- Alcohol/Beer -->
                <div class="flex flex-col items-center animate-wobble" style="animation-delay: 1s;">
                    <div class="w-32 h-32 relative">
                        <!-- Bubbles Animation Elements -->
                        <div class="bubble w-2 h-2 left-8 top-10"></div>
                        <div class="bubble w-3 h-3 left-16 top-6" style="animation-delay: 0.5s"></div>
                        <div class="bubble w-2 h-2 left-20 top-12" style="animation-delay: 1.2s"></div>

                        <!-- Beer SVG -->
                        <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-md">
                            <!-- Handle -->
                            <path d="M75,35 Q95,35 95,55 Q95,75 75,75" fill="none" stroke="#add8e6" stroke-width="8" stroke-linecap="round" />
                            <path d="M75,35 Q95,35 95,55 Q95,75 75,75" fill="none" class="cartoon-stroke" />
                            
                            <!-- Mug Body -->
                            <path d="M20,30 L20,80 Q20,90 30,90 L70,90 Q80,90 80,80 L80,30" fill="#fff" class="cartoon-stroke"/>
                            <!-- Beer Liquid -->
                            <path d="M25,40 L25,80 Q25,85 30,85 L70,85 Q75,85 75,80 L75,40 Z" fill="#facc15" stroke="none"/>
                            <!-- Bubbles in liquid -->
                            <circle cx="35" cy="60" r="2" fill="#fff" opacity="0.6"/>
                            <circle cx="65" cy="70" r="3" fill="#fff" opacity="0.6"/>
                            <circle cx="50" cy="50" r="2" fill="#fff" opacity="0.6"/>
                            
                            <!-- Foam -->
                            <path d="M15,30 Q15,15 30,20 Q35,5 50,15 Q65,5 70,20 Q85,15 85,30 Z" fill="#fff" class="cartoon-stroke"/>
                            <!-- Foam drip -->
                            <path d="M30,30 L30,40 Q30,45 35,40 L35,30" fill="#fff" stroke="none"/>
                            <path d="M30,30 L30,40 Q30,45 35,40 L35,30" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h2 class="mt-2 text-lg md:text-xl font-bold text-gray-900 cartoon-text">酒精</h2>
                </div>

            </div>
        </div>

        <div class="mt-12 p-6 bg-orange-50 rounded-2xl border-2 border-orange-200 text-gray-700 text-sm md:text-base leading-relaxed shadow-sm">
            <h3 class="font-bold text-orange-600 text-lg mb-3 flex items-center">
                <span class="mr-2">💡</span> 科学原理
            </h3>
            <p class="mb-2 text-justify">
                面团发酵主要是酵母菌将面粉中的糖类物质转化为二氧化碳气体和酒精的过程。
            </p>
            <p class="text-justify">
                产生的二氧化碳气体在面团中被面筋网络包裹，使面团膨胀，形成松软的结构。酒精则在后续的蒸制过程中挥发掉，不会对馒头口感产生显著影响。
            </p>
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蜂蜜酿造流程 - 交互动画</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #fef9e7 0%, #fff8e1 50%, #fff3e0 100%);
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 32px rgba(218, 165, 32, 0.15);
        }

        .honey-glow {
            filter: drop-shadow(0 0 20px rgba(255, 193, 7, 0.6));
        }

        .molecule {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes wing-flap {

            0%,
            100% {
                transform: scaleX(1);
            }

            50% {
                transform: scaleX(0.3);
            }
        }

        @keyframes evaporate {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.8;
            }

            100% {
                transform: translateY(-60px) scale(2);
                opacity: 0;
            }
        }

        @keyframes drip {
            0% {
                transform: translateY(0) scale(1);
            }

            80% {
                transform: translateY(20px) scale(0.8);
            }

            100% {
                transform: translateY(40px) scale(0);
                opacity: 0;
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                filter: drop-shadow(0 0 5px rgba(255, 193, 7, 0.5));
            }

            50% {
                filter: drop-shadow(0 0 20px rgba(255, 193, 7, 0.9));
            }
        }

        .control-btn {
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(218, 165, 32, 0.4);
        }

        .step-indicator {
            transition: all 0.5s ease;
        }

        .step-active {
            background: linear-gradient(135deg, #ffc107 0%, #ff8f00 100%);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.6);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 标题区域 -->
    <div class="text-center mb-8 relative">
        <h1 class="text-4xl md:text-5xl font-bold text-amber-900 mb-2 tracking-wider"
            style="text-shadow: 2px 2px 4px rgba(0,0,0,0.1);">
            蜂蜜酿造流程
        </h1>
        <div class="h-1 w-32 bg-gradient-to-r from-amber-400 to-amber-600 mx-auto rounded-full"></div>
        <p class="mt-4 text-amber-800 text-lg opacity-80">点击步骤或播放观看完整酿造过程</p>
    </div>

    <!-- 主SVG容器 -->
    <div class="relative w-full max-w-6xl">
        <div class="glass-panel rounded-3xl p-4 md:p-8 relative overflow-hidden">

            <!-- 步骤指示器 -->
            <div class="flex justify-center gap-4 mb-6 flex-wrap">
                <button onclick="goToStep(0)"
                    class="step-indicator step-active px-4 py-2 rounded-full bg-amber-200 text-amber-900 font-bold text-sm md:text-base cursor-pointer border-2 border-amber-400"
                    id="step-0">
                    1. 采集花蜜
                </button>
                <button onclick="goToStep(1)"
                    class="step-indicator px-4 py-2 rounded-full bg-amber-100 text-amber-800 font-bold text-sm md:text-base cursor-pointer border-2 border-amber-300"
                    id="step-1">
                    2. 处理花蜜
                </button>
                <button onclick="goToStep(2)"
                    class="step-indicator px-4 py-2 rounded-full bg-amber-100 text-amber-800 font-bold text-sm md:text-base cursor-pointer border-2 border-amber-300"
                    id="step-2">
                    3. 水分蒸发
                </button>
                <button onclick="goToStep(3)"
                    class="step-indicator px-4 py-2 rounded-full bg-amber-100 text-amber-800 font-bold text-sm md:text-base cursor-pointer border-2 border-amber-300"
                    id="step-3">
                    4. 糖类转化
                </button>
                <button onclick="goToStep(4)"
                    class="step-indicator px-4 py-2 rounded-full bg-amber-100 text-amber-800 font-bold text-sm md:text-base cursor-pointer border-2 border-amber-300"
                    id="step-4">
                    5. 蜡封储存
                </button>
            </div>

            <svg viewBox="0 0 1000 600" class="w-full h-auto" id="main-svg" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <!-- 渐变定义 -->
                    <linearGradient id="honeyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
                    </linearGradient>

                    <linearGradient id="cellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFE082;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
                    </linearGradient>

                    <radialGradient id="nectarGradient" cx="50%" cy="50%">
                        <stop offset="0%" style="stop-color:#FFF8E1;stop-opacity:0.9" />
                        <stop offset="100%" style="stop-color:#FFD54F;stop-opacity:0.6" />
                    </radialGradient>

                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur" />
                        <feMerge>
                            <feMergeNode in="coloredBlur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>

                <!-- 背景装饰 - 蜂巢图案 -->
                <g id="bg-honeycomb" opacity="0.1">
                    <pattern id="honeycomb" x="0" y="0" width="50" height="43.3" patternUnits="userSpaceOnUse">
                        <path d="M25 0 L50 14.43 L50 38.97 L25 53.4 L0 38.97 L0 14.43 Z" fill="none" stroke="#FFA000"
                            stroke-width="1" />
                    </pattern>
                    <rect width="100%" height="100%" fill="url(#honeycomb)" />
                </g>

                <!-- 步骤1: 蜜蜂收集花蜜 -->
                <g id="step1-group" transform="translate(100, 100)">
                    <!-- 花朵 -->
                    <g id="flower" transform="translate(0, 50)">
                        <path d="M0 0 Q-10 -20 0 -40 Q10 -20 0 0" fill="#E91E63" opacity="0.8" />
                        <path d="M0 0 Q20 -10 40 0 Q20 10 0 0" fill="#F06292" opacity="0.8" />
                        <path d="M0 0 Q10 20 0 40 Q-10 20 0 0" fill="#EC407A" opacity="0.8" />
                        <path d="M0 0 Q-20 10 -40 0 Q-20 -10 0 0" fill="#D81B60" opacity="0.8" />
                        <circle cx="0" cy="0" r="8" fill="#FFEB3B" />
                        <circle cx="0" cy="0" r="4" fill="#F57F17" />
                    </g>

                    <!-- 蜜蜂 -->
                    <g id="bee-collecting" transform="translate(20, 20)">
                        <ellipse cx="0" cy="0" rx="12" ry="8" fill="#FFC107" />
                        <ellipse cx="0" cy="0" rx="8" ry="5" fill="#212121" opacity="0.8" />
                        <ellipse cx="-5" cy="-8" rx="8" ry="3" fill="#E0E0E0" opacity="0.6" class="wing-left"
                            style="animation: wing-flap 0.1s infinite; transform-origin: right center;" />
                        <ellipse cx="5" cy="-8" rx="8" ry="3" fill="#E0E0E0" opacity="0.6" class="wing-right"
                            style="animation: wing-flap 0.1s infinite; transform-origin: left center;" />
                        <circle cx="10" cy="-2" r="4" fill="#FFC107" />
                        <circle cx="12" cy="-2" r="1.5" fill="black" />
                    </g>

                    <text x="0" y="120" text-anchor="middle" fill="#5D4037" font-size="16"
                        font-weight="bold">蜜蜂收集花蜜</text>
                </g>

                <!-- 流动路径（花蜜流动） -->
                <path id="nectar-path" d="M 120 220 Q 200 250 300 250 T 480 250" fill="none"
                    stroke="url(#honeyGradient)" stroke-width="0" stroke-linecap="round" opacity="0.8" />

                <!-- 动态花蜜滴 -->
                <g id="nectar-drops"></g>

                <!-- 步骤2: 蜂巢处理 -->
                <g id="step2-group" transform="translate(400, 150)" opacity="0.3">
                    <!-- 蜂巢单元组 -->
                    <g id="honeycomb-cells">
                        <!-- 中心单元 -->
                        <path d="M0 -30 L26 -15 L26 15 L0 30 L-26 15 L-26 -15 Z" fill="url(#cellGradient)"
                            stroke="#FFA000" stroke-width="2" />
                        <path d="M0 -30 L26 -15 L26 15 L0 30 L-26 15 L-26 -15 Z" fill="url(#honeyGradient)" opacity="0"
                            id="cell-fill" />

                        <!-- 周围单元 -->
                        <path d="M0 -90 L26 -75 L26 -45 L0 -30 L-26 -45 L-26 -75 Z" fill="#FFF8E1" stroke="#FFD54F"
                            stroke-width="1.5" />
                        <path d="M52 -60 L78 -45 L78 -15 L52 0 L26 -15 L26 -45 Z" fill="#FFF8E1" stroke="#FFD54F"
                            stroke-width="1.5" />
                        <path d="M52 0 L78 15 L78 45 L52 60 L26 45 L26 15 Z" fill="#FFF8E1" stroke="#FFD54F"
                            stroke-width="1.5" />
                        <path d="M0 30 L26 45 L26 75 L0 90 L-26 75 L-26 45 Z" fill="#FFF8E1" stroke="#FFD54F"
                            stroke-width="1.5" />
                        <path d="M-52 0 L-26 15 L-26 45 L-52 60 L-78 45 L-78 15 Z" fill="#FFF8E1" stroke="#FFD54F"
                            stroke-width="1.5" />
                        <path d="M-52 -60 L-26 -45 L-26 -15 L-52 0 L-78 -15 L-78 -45 Z" fill="#FFF8E1" stroke="#FFD54F"
                            stroke-width="1.5" />
                    </g>

                    <!-- 处理中的蜜蜂 -->
                    <g id="bee-processing" transform="translate(0, -50)" style="display:none;">
                        <ellipse cx="0" cy="0" rx="10" ry="7" fill="#FFC107" />
                        <rect x="-6" y="-3" width="12" height="6" fill="#212121" opacity="0.8" />
                        <ellipse cx="-4" cy="-6" rx="6" ry="2" fill="#E0E0E0" opacity="0.6"
                            style="animation: wing-flap 0.05s infinite" />
                        <ellipse cx="4" cy="-6" rx="6" ry="2" fill="#E0E0E0" opacity="0.6"
                            style="animation: wing-flap 0.05s infinite" />
                    </g>

                    <text x="0" y="120" text-anchor="middle" fill="#5D4037" font-size="16"
                        font-weight="bold">蜜蜂处理花蜜</text>
                </g>

                <!-- 步骤3: 水分蒸发 -->
                <g id="step3-group" transform="translate(650, 150)" opacity="0.3">
                    <g id="evaporation-container">
                        <!-- 水滴图标 -->
                        <path d="M0 40 Q-15 20 0 -10 Q15 20 0 40" fill="#81D4FA" opacity="0.6" id="water-drop" />
                        <g id="steam-particles"></g>
                    </g>
                    <text x="0" y="80" text-anchor="middle" fill="#1976D2" font-size="14" font-weight="bold">水分蒸发</text>
                    <text x="0" y="100" text-anchor="middle" fill="#5D4037" font-size="12">翅膀扇动加速蒸发</text>
                </g>

                <!-- 步骤4: 糖类转化 -->
                <g id="step4-group" transform="translate(400, 400)" opacity="0.3">
                    <text x="0" y="-80" text-anchor="middle" fill="#5D4037" font-size="18"
                        font-weight="bold">糖类转化</text>

                    <!-- 蔗糖 -->
                    <g id="sucrose" transform="translate(-150, 0)">
                        <circle cx="0" cy="0" r="25" fill="#FFD54F" opacity="0.9" class="molecule" />
                        <text x="0" y="5" text-anchor="middle" fill="#5D4037" font-size="12"
                            font-weight="bold">蔗糖</text>
                        <text x="0" y="40" text-anchor="middle" fill="#8D6E63" font-size="11">C₁₂H₂₂O₁₁</text>
                    </g>

                    <!-- 箭头 -->
                    <g id="reaction-arrow" opacity="0">
                        <path d="M-80 0 L80 0" stroke="#FF6F00" stroke-width="3" marker-end="url(#arrowhead)" />
                        <defs>
                            <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                                <polygon points="0 0, 10 3, 0 6" fill="#FF6F00" />
                            </marker>
                        </defs>
                    </g>

                    <!-- 葡萄糖 -->
                    <g id="glucose" transform="translate(80, -30)" opacity="0">
                        <circle cx="0" cy="0" r="20" fill="#FFF176" opacity="0.9" class="molecule" />
                        <text x="0" y="4" text-anchor="middle" fill="#5D4037" font-size="11"
                            font-weight="bold">葡萄糖</text>
                        <text x="0" y="35" text-anchor="middle" fill="#8D6E63" font-size="10">C₆H₁₂O₆</text>
                    </g>

                    <!-- 果糖 -->
                    <g id="fructose" transform="translate(80, 30)" opacity="0">
                        <circle cx="0" cy="0" r="20" fill="#FFECB3" opacity="0.9" class="molecule" />
                        <text x="0" y="4" text-anchor="middle" fill="#5D4037" font-size="11"
                            font-weight="bold">果糖</text>
                        <text x="0" y="35" text-anchor="middle" fill="#8D6E63" font-size="10">C₆H₁₂O₆</text>
                    </g>

                    <text x="0" y="70" text-anchor="middle" fill="#6D4C41" font-size="13">转化酶作用</text>
                </g>

                <!-- 步骤5: 蜂蜜成熟 -->
                <g id="step5-group" transform="translate(800, 400)" opacity="0.3">
                    <g id="honey-completed" style="animation: float 3s ease-in-out infinite;">
                        <!-- 蜂巢块 -->
                        <path d="M-40 -20 L-20 -35 L20 -35 L40 -20 L40 20 L20 35 L-20 35 L-40 20 Z"
                            fill="url(#honeyGradient)" stroke="#FF8F00" stroke-width="2" filter="url(#glow)" />
                        <path d="M-20 -35 L-20 35 M20 -35 L20 35 M-40 -20 L40 -20 M-40 20 L40 20" stroke="#FF8F00"
                            stroke-width="1" opacity="0.5" />

                        <!-- 滴落的蜂蜜 -->
                        <path id="honey-drip" d="M0 35 Q0 45 0 55 Q0 60 0 65" fill="none" stroke="#FF8C00"
                            stroke-width="8" stroke-linecap="round" opacity="0" />
                        <circle id="honey-drop" cx="0" cy="65" r="6" fill="#FF8C00" opacity="0" />
                    </g>
                    <text x="0" y="90" text-anchor="middle" fill="#5D4037" font-size="16" font-weight="bold">蜂蜜成熟</text>
                    <text x="0" y="110" text-anchor="middle" fill="#795548" font-size="14">蜡封储存</text>
                </g>

                <!-- 连接线和流动效果 -->
                <g id="connections" opacity="0">
                    <path d="M 200 200 L 350 250" stroke="#FFD54F" stroke-width="2" stroke-dasharray="5,5"
                        opacity="0.5" />
                    <path d="M 480 250 L 600 250" stroke="#81D4FA" stroke-width="2" stroke-dasharray="5,5"
                        opacity="0.5" />
                </g>

            </svg>

            <!-- 控制按钮 -->
            <div class="flex justify-center gap-4 mt-6">
                <button onclick="playAnimation()"
                    class="control-btn px-8 py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-full font-bold text-lg shadow-lg flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    播放完整流程
                </button>
                <button onclick="resetAnimation()"
                    class="control-btn px-6 py-3 bg-white text-amber-700 border-2 border-amber-400 rounded-full font-bold text-lg shadow-md hover:bg-amber-50">
                    重置
                </button>
            </div>

            <!-- 说明文字 -->
            <div id="description-box"
                class="mt-6 p-4 bg-amber-50 rounded-xl border-l-4 border-amber-500 text-amber-900 text-center min-h-[60px] flex items-center justify-center transition-all duration-500">
                点击"播放完整流程"观看蜜蜂酿造蜂蜜的神奇过程，或点击上方步骤查看特定环节
            </div>
        </div>
    </div>

    <script>
        let currentStep = 0;
        let isAnimating = false;
        const descriptions = [
            "蜜蜂从花朵中采集花蜜，存入蜜囊带回蜂巢",
            "工蜂将花蜜吐入蜂巢，开始加工处理",
            "蜜蜂扇动翅膀产生气流，使花蜜中的水分从60%降至20%",
            "蜜蜂唾液中的转化酶将蔗糖分解为葡萄糖和果糖",
            "蜂蜜成熟后，蜜蜂用蜂蜡封盖储存"
        ];

        function updateStepIndicator(step) {
            // 更新按钮状态
            for (let i = 0; i < 5; i++) {
                const btn = document.getElementById(`step-${i}`);
                if (i === step) {
                    btn.classList.add('step-active');
                    btn.classList.remove('bg-amber-100', 'border-amber-300');
                    btn.classList.add('bg-amber-200', 'border-amber-400');
                } else {
                    btn.classList.remove('step-active');
                    btn.classList.add('bg-amber-100', 'border-amber-300');
                    btn.classList.remove('bg-amber-200', 'border-amber-400');
                }
            }

            // 更新描述
            const descBox = document.getElementById('description-box');
            descBox.style.opacity = '0';
            setTimeout(() => {
                descBox.textContent = descriptions[step];
                descBox.style.opacity = '1';
            }, 250);
        }

        function goToStep(step) {
            if (isAnimating) return;
            currentStep = step;
            updateStepIndicator(step);
            highlightStep(step);
        }

        function highlightStep(step) {
            // 重置所有组的透明度
            const groups = ['step1-group', 'step2-group', 'step3-group', 'step4-group', 'step5-group'];
            groups.forEach((id, index) => {
                const el = document.getElementById(id);
                if (index === step) {
                    el.style.transition = 'all 0.5s ease';
                    el.setAttribute('opacity', '1');
                    el.style.filter = 'brightness(1.1)';
                } else {
                    el.setAttribute('opacity', '0.3');
                    el.style.filter = 'brightness(1)';
                }
            });

            // 特定步骤的动画效果
            if (step === 0) animateBeeCollecting();
            if (step === 1) animateHoneyProcessing();
            if (step === 2) animateEvaporation();
            if (step === 3) animateChemicalConversion();
            if (step === 4) animateFinalHoney();
        }

        function animateBeeCollecting() {
            const bee = document.getElementById('bee-collecting');
            bee.style.animation = 'float 2s ease-in-out infinite';

            // 创建花蜜滴落效果
            setTimeout(() => {
                createNectarDrop();
            }, 500);
        }

        function createNectarDrop() {
            const dropsGroup = document.getElementById('nectar-drops');
            const drop = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            drop.setAttribute("cx", "120");
            drop.setAttribute("cy", "220");
            drop.setAttribute("r", "4");
            drop.setAttribute("fill", "url(#honeyGradient)");
            drop.style.animation = "drip 1.5s ease-in forwards";
            dropsGroup.appendChild(drop);

            setTimeout(() => {
                drop.remove();
            }, 1500);
        }

        function animateHoneyProcessing() {
            document.getElementById('bee-processing').style.display = 'block';
            document.getElementById('cell-fill').style.transition = 'opacity 2s';
            document.getElementById('cell-fill').setAttribute('opacity', '0.8');

            // 蜜蜂移动动画
            let angle = 0;
            const bee = document.getElementById('bee-processing');
            const interval = setInterval(() => {
                angle += 0.1;
                const x = Math.cos(angle) * 30;
                const y = Math.sin(angle) * 20 - 50;
                bee.setAttribute('transform', `translate(${x}, ${y})`);
            }, 50);

            setTimeout(() => clearInterval(interval), 3000);
        }

        function animateEvaporation() {
            const container = document.getElementById('steam-particles');
            container.innerHTML = '';

            // 创建蒸汽粒子
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const particle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    particle.setAttribute("cx", (Math.random() - 0.5) * 30);
                    particle.setAttribute("cy", 20);
                    particle.setAttribute("r", Math.random() * 3 + 2);
                    particle.setAttribute("fill", "#81D4FA");
                    particle.setAttribute("opacity", "0.6");
                    particle.style.animation = `evaporate ${2 + Math.random()}s ease-out forwards`;
                    container.appendChild(particle);

                    setTimeout(() => particle.remove(), 3000);
                }, i * 200);
            }
        }

        function animateChemicalConversion() {
            // 显示箭头
            document.getElementById('reaction-arrow').style.transition = 'opacity 0.5s';
            document.getElementById('reaction-arrow').setAttribute('opacity', '1');

            // 分子分解动画
            setTimeout(() => {
                const glucose = document.getElementById('glucose');
                const fructose = document.getElementById('fructose');
                const sucrose = document.getElementById('sucrose');

                sucrose.style.transition = 'all 1s ease';
                sucrose.setAttribute('opacity', '0.3');
                sucrose.style.transform = 'translate(-150px, 0) scale(0.8)';

                glucose.style.transition = 'all 1s ease';
                glucose.setAttribute('opacity', '1');

                fructose.style.transition = 'all 1s ease';
                fructose.setAttribute('opacity', '1');

                // 添加发光效果
                glucose.style.filter = 'url(#glow)';
                fructose.style.filter = 'url(#glow)';
            }, 500);
        }

        function animateFinalHoney() {
            const drip = document.getElementById('honey-drip');
            const drop = document.getElementById('honey-drop');

            drip.style.transition = 'all 1s ease';
            drip.setAttribute('opacity', '1');

            setTimeout(() => {
                drop.style.transition = 'all 0.5s ease';
                drop.setAttribute('opacity', '1');
                drop.style.animation = 'drip 2s ease-in-out infinite';
            }, 500);
        }

        async function playAnimation() {
            if (isAnimating) return;
            isAnimating = true;

            // 重置所有
            resetAll();

            // 依次播放每个步骤
            for (let i = 0; i < 5; i++) {
                currentStep = i;
                updateStepIndicator(i);
                highlightStep(i);

                // 等待动画完成
                await new Promise(resolve => setTimeout(resolve, 3000));
            }

            isAnimating = false;

            // 显示完成状态
            document.getElementById('description-box').textContent = "蜂蜜酿造完成！蜜蜂的辛勤劳动将花蜜转化为了甘甜的蜂蜜。";
            document.getElementById('description-box').classList.add('bg-green-50', 'border-green-500', 'text-green-900');
        }

        function resetAll() {
            // 重置所有元素状态
            document.getElementById('step1-group').setAttribute('opacity', '0.3');
            document.getElementById('step2-group').setAttribute('opacity', '0.3');
            document.getElementById('step3-group').setAttribute('opacity', '0.3');
            document.getElementById('step4-group').setAttribute('opacity', '0.3');
            document.getElementById('step5-group').setAttribute('opacity', '0.3');

            document.getElementById('cell-fill').setAttribute('opacity', '0');
            document.getElementById('bee-processing').style.display = 'none';
            document.getElementById('reaction-arrow').setAttribute('opacity', '0');
            document.getElementById('glucose').setAttribute('opacity', '0');
            document.getElementById('fructose').setAttribute('opacity', '0');
            document.getElementById('sucrose').setAttribute('opacity', '1');
            document.getElementById('sucrose').style.transform = 'translate(-150px, 0) scale(1)';

            document.getElementById('nectar-drops').innerHTML = '';
            document.getElementById('steam-particles').innerHTML = '';

            document.getElementById('description-box').classList.remove('bg-green-50', 'border-green-500', 'text-green-900');
        }

        function resetAnimation() {
            isAnimating = false;
            currentStep = 0;
            resetAll();
            updateStepIndicator(0);
            highlightStep(0);
        }

        // 初始化
        updateStepIndicator(0);
        highlightStep(0);
    </script>
</body>

</html>

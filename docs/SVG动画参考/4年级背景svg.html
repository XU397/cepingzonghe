<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成都出行方案 - SVG动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #B0E0E6 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 1920px;
        }
    </style>
</head>

<body>
    <div id="canvas-container">
        <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- 天空渐变 -->
                <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#B3E5FC;stop-opacity:1" />
                </linearGradient>

                <!-- 水面渐变 -->
                <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#0288D1;stop-opacity:0.8" />
                    <stop offset="100%" style="stop-color:#01579B;stop-opacity:0.9" />
                </linearGradient>

                <!-- 桥的颜色 -->
                <linearGradient id="bridgeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#D84315;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#BF360C;stop-opacity:1" />
                </linearGradient>

                <!-- 太阳神鸟金色 -->
                <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#FFA000;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#FF6F00;stop-opacity:1" />
                </linearGradient>

                <!-- 水面波纹滤镜 -->
                <filter id="turbulence" x="0" y="0" width="100%" height="100%">
                    <feTurbulence type="fractalNoise" baseFrequency="0.02 0.1" numOctaves="2" result="noise" />
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R"
                        yChannelSelector="G" />
                </filter>
            </defs>

            <!-- 背景天空 -->
            <rect width="1200" height="800" fill="url(#skyGradient)" />

            <!-- 云朵组 -->
            <g id="clouds" fill="#FFFFFF" opacity="0.9">
                <!-- 云朵1 -->
                <g transform="translate(100, 100)">
                    <ellipse cx="0" cy="0" rx="60" ry="30" />
                    <ellipse cx="40" cy="-10" rx="50" ry="35" />
                    <ellipse cx="80" cy="0" rx="40" ry="25" />
                    <animateTransform attributeName="transform" type="translate" values="100,100; 200,100; 100,100"
                        dur="20s" repeatCount="indefinite" />
                </g>
                <!-- 云朵2 -->
                <g transform="translate(900, 150)">
                    <ellipse cx="0" cy="0" rx="50" ry="25" />
                    <ellipse cx="35" cy="-8" rx="45" ry="30" />
                    <ellipse cx="70" cy="0" rx="35" ry="22" />
                    <animateTransform attributeName="transform" type="translate" values="900,150; 750,150; 900,150"
                        dur="25s" repeatCount="indefinite" />
                </g>
                <!-- 云朵3 -->
                <g transform="translate(500, 80)">
                    <ellipse cx="0" cy="0" rx="45" ry="22" />
                    <ellipse cx="30" cy="-5" rx="40" ry="28" />
                    <ellipse cx="60" cy="0" rx="30" ry="20" />
                    <animateTransform attributeName="transform" type="translate" values="500,80; 600,80; 500,80"
                        dur="18s" repeatCount="indefinite" />
                </g>
            </g>

            <!-- 远景建筑群 -->
            <g id="cityscape" transform="translate(0, 300)">
                <!-- 左侧现代建筑 -->
                <rect x="150" y="50" width="80" height="150" fill="#4DD0E1" stroke="#0097A7" stroke-width="2" />
                <path d="M150,50 L190,20 L230,50" fill="#4DD0E1" stroke="#0097A7" stroke-width="2" />

                <!-- 339电视塔 -->
                <rect x="380" y="0" width="15" height="200" fill="#F06292" />
                <circle cx="387.5" cy="0" r="25" fill="none" stroke="#F06292" stroke-width="3" />
                <line x1="387.5" y1="-25" x2="387.5" y2="-50" stroke="#F06292" stroke-width="2" />

                <!-- 中间玻璃建筑 -->
                <path d="M250,200 L280,50 L310,200 Z" fill="#81D4FA" stroke="#0288D1" stroke-width="2" />
                <path d="M250,200 L280,50 L310,200" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1" />

                <!-- 右侧高楼群 -->
                <rect x="700" y="80" width="60" height="120" fill="#4FC3F7" stroke="#0277BD" stroke-width="2" />
                <rect x="780" y="40" width="70" height="160" fill="#29B6F6" stroke="#01579B" stroke-width="2" />
                <rect x="870" y="60" width="50" height="140" fill="#039BE5" stroke="#014F8C" stroke-width="2" />
            </g>

            <!-- 太阳神鸟雕塑（旋转动画） -->
            <g id="sunbird" transform="translate(680, 280)">
                <g>
                    <circle cx="0" cy="0" r="40" fill="url(#goldGradient)" />
                    <!-- 鸟形图案简化 -->
                    <path d="M0,-30 Q10,-10 30,0 Q10,10 0,30 Q-10,10 -30,0 Q-10,-10 0,-30" fill="#FF8F00"
                        opacity="0.8" />
                    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="10s"
                        repeatCount="indefinite" />
                </g>
                <!-- 支架 -->
                <rect x="-5" y="40" width="10" height="80" fill="#8D6E63" />
            </g>

            <!-- 左侧古建筑（亭子） -->
            <g id="pavilion-left" transform="translate(80, 420)">
                <!-- 屋顶 -->
                <path d="M-60,0 L0,-60 L60,0" fill="#D84315" stroke="#BF360C" stroke-width="3" />
                <path d="M-50,-10 L0,-65 L50,-10" fill="#E64A19" />
                <!-- 柱子 -->
                <rect x="-50" y="0" width="10" height="80" fill="#5D4037" />
                <rect x="40" y="0" width="10" height="80" fill="#5D4037" />
                <rect x="-5" y="0" width="10" height="80" fill="#5D4037" />
                <!-- 栏杆 -->
                <rect x="-60" y="80" width="120" height="10" fill="#8D6E63" />
                <rect x="-60" y="50" width="120" height="5" fill="#8D6E63" />
            </g>

            <!-- 右侧古建筑（塔楼） -->
            <g id="pagoda-right" transform="translate(1100, 350)">
                <!-- 多层塔 -->
                <g transform="translate(0, 0)">
                    <path d="M-40,0 L0,-40 L40,0" fill="#FFB300" stroke="#F57F17" stroke-width="2" />
                    <rect x="-30" y="0" width="60" height="40" fill="#8D6E63" />
                </g>
                <g transform="translate(0, 40)">
                    <path d="M-45,0 L0,-40 L45,0" fill="#FFB300" stroke="#F57F17" stroke-width="2" />
                    <rect x="-35" y="0" width="70" height="40" fill="#8D6E63" />
                </g>
                <g transform="translate(0, 80)">
                    <path d="M-50,0 L0,-40 L50,0" fill="#FFB300" stroke="#F57F17" stroke-width="2" />
                    <rect x="-40" y="0" width="80" height="40" fill="#8D6E63" />
                </g>
                <g transform="translate(0, 120)">
                    <path d="M-55,0 L0,-40 L55,0" fill="#FFB300" stroke="#F57F17" stroke-width="2" />
                    <rect x="-45" y="0" width="90" height="40" fill="#8D6E63" />
                </g>
                <!-- 飞檐装饰 -->
                <circle cx="-55" cy="0" r="3" fill="#FFD54F" />
                <circle cx="55" cy="0" r="3" fill="#FFD54F" />
            </g>

            <!-- 水面 -->
            <rect x="0" y="600" width="1200" height="200" fill="url(#waterGradient)" />

            <!-- 倒影（带波动效果） -->
            <g id="reflections" transform="translate(0, 600) scale(1,-1)" opacity="0.3" filter="url(#turbulence)">
                <!-- 桥倒影 -->
                <path d="M200,0 Q300,-50 400,0 Q500,-50 600,0 Q700,-50 800,0" fill="none" stroke="#D84315"
                    stroke-width="20" />
            </g>

            <!-- 水波纹动画 -->
            <g id="ripples" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none">
                <ellipse cx="300" cy="650" rx="100" ry="20" opacity="0.5">
                    <animate attributeName="rx" values="100;120;100" dur="3s" repeatCount="indefinite" />
                    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite" />
                </ellipse>
                <ellipse cx="600" cy="700" rx="80" ry="15" opacity="0.4">
                    <animate attributeName="rx" values="80;100;80" dur="4s" repeatCount="indefinite" />
                    <animate attributeName="opacity" values="0.4;0;0.4" dur="4s" repeatCount="indefinite" />
                </ellipse>
                <ellipse cx="900" cy="650" rx="120" ry="25" opacity="0.3">
                    <animate attributeName="rx" values="120;150;120" dur="3.5s" repeatCount="indefinite" />
                    <animate attributeName="opacity" values="0.3;0;0.3" dur="3.5s" repeatCount="indefinite" />
                </ellipse>
            </g>

            <!-- 桥 -->
            <g id="bridge" transform="translate(200, 480)">
                <!-- 桥身 -->
                <path d="M0,80 Q100,20 200,80 Q300,20 400,80 Q500,20 600,80" fill="none" stroke="url(#bridgeGradient)"
                    stroke-width="25" stroke-linecap="round" />
                <!-- 桥拱 -->
                <path d="M50,80 Q100,40 150,80" fill="none" stroke="#8D6E63" stroke-width="8" />
                <path d="M250,80 Q300,40 350,80" fill="none" stroke="#8D6E63" stroke-width="8" />
                <path d="M450,80 Q500,40 550,80" fill="none" stroke="#8D6E63" stroke-width="8" />

                <!-- 桥上的亭子 -->
                <g transform="translate(250, 20)">
                    <rect x="-40" y="0" width="80" height="60" fill="#D84315" />
                    <path d="M-50,0 L0,-40 L50,0" fill="#FFB300" stroke="#F57F17" />
                    <line x1="-40" y1="20" x2="40" y2="20" stroke="#8D6E63" stroke-width="2" />
                    <line x1="-40" y1="40" x2="40" y2="40" stroke="#8D6E63" stroke-width="2" />
                </g>
            </g>

            <!-- 河岸绿植 -->
            <g id="vegetation">
                <path d="M0,600 Q100,550 200,600" fill="#689F38" stroke="#558B2F" stroke-width="2" />
                <path d="M1000,600 Q1100,550 1200,600" fill="#689F38" stroke="#558B2F" stroke-width="2" />
                <!-- 树木 -->
                <circle cx="50" cy="580" r="30" fill="#7CB342" />
                <circle cx="100" cy="590" r="25" fill="#8BC34A" />
                <circle cx="1100" cy="580" r="35" fill="#7CB342" />
                <circle cx="1150" cy="590" r="28" fill="#8BC34A" />
            </g>

            <!-- 熊猫（主要动画元素） -->
            <g id="panda" transform="translate(450, 420)">
                <!-- 身体 -->
                <ellipse cx="0" cy="60" rx="70" ry="80" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2" />
                <ellipse cx="0" cy="60" rx="50" ry="60" fill="#333333" opacity="0.1" /> <!-- 阴影 -->

                <!-- 腿 -->
                <ellipse cx="-40" cy="120" rx="25" ry="35" fill="#333333" />
                <ellipse cx="40" cy="120" rx="25" ry="35" fill="#333333" />
                <ellipse cx="-40" cy="120" rx="15" ry="20" fill="#000000" />
                <ellipse cx="40" cy="120" rx="15" ry="20" fill="#000000" />

                <!-- 手臂（左臂挥手动画） -->
                <g>
                    <ellipse cx="-50" cy="50" rx="20" ry="40" fill="#333333" transform="rotate(30 -50 50)">
                        <animateTransform attributeName="transform" type="rotate"
                            values="30 -50 50; -10 -50 50; 30 -50 50" dur="1s" repeatCount="indefinite" />
                    </ellipse>
                </g>
                <ellipse cx="50" cy="60" rx="20" ry="35" fill="#333333" />

                <!-- 头 -->
                <circle cx="0" cy="0" r="65" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2" />

                <!-- 耳朵 -->
                <circle cx="-50" cy="-40" r="20" fill="#333333" />
                <circle cx="50" cy="-40" r="20" fill="#333333" />

                <!-- 黑眼圈 -->
                <ellipse cx="-25" cy="-10" rx="18" ry="22" fill="#333333" />
                <ellipse cx="25" cy="-10" rx="18" ry="22" fill="#333333" />

                <!-- 眼睛 -->
                <circle cx="-22" cy="-10" r="6" fill="#FFFFFF" />
                <circle cx="22" cy="-10" r="6" fill="#FFFFFF" />
                <circle cx="-22" cy="-10" r="3" fill="#000000" />
                <circle cx="22" cy="-10" r="3" fill="#000000" />

                <!-- 鼻子 -->
                <ellipse cx="0" cy="15" rx="8" ry="5" fill="#333333" />

                <!-- 嘴巴 -->
                <path d="M-10,25 Q0,35 10,25" fill="none" stroke="#333333" stroke-width="3" stroke-linecap="round" />

                <!-- 脸颊红晕 -->
                <ellipse cx="-45" cy="10" rx="10" ry="6" fill="#FFB6C1" opacity="0.6" />
                <ellipse cx="45" cy="10" rx="10" ry="6" fill="#FFB6C1" opacity="0.6" />

                <!-- 整体轻微上下浮动 -->
                <animateTransform attributeName="transform" type="translate" values="450,420; 450,410; 450,420" dur="2s"
                    repeatCount="indefinite" />
            </g>

            <!-- 标题 -->
            <g id="title" transform="translate(60, 60)">
                <!-- 绿色椭圆背景 -->
                <rect x="0" y="-35" width="200" height="70" rx="35" fill="#7CB342" stroke="#558B2F" stroke-width="3" />
                <rect x="5" y="-30" width="190" height="60" rx="30" fill="#8BC34A" opacity="0.5" />

                <!-- 数字1 -->
                <text x="30" y="15" font-family="Arial, sans-serif" font-size="48" font-weight="bold"
                    fill="#FFFFFF">1</text>

                <!-- 文字 -->
                <text x="65" y="15" font-family="Arial, sans-serif" font-size="36" font-weight="bold"
                    fill="#FFFFFF">出行方案</text>
            </g>

            <!-- 装饰性闪光 -->
            <g id="sparkles">
                <g transform="translate(750, 350)">
                    <path d="M0,-10 L2,0 L0,10 L-2,0 Z" fill="#FFD700">
                        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2s"
                            repeatCount="indefinite" />
                    </path>
                </g>
                <g transform="translate(350, 250)">
                    <path d="M0,-8 L1.5,0 L0,8 L-1.5,0 Z" fill="#FFD700">
                        <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.5s" begin="0.5s"
                            repeatCount="indefinite" />
                    </path>
                </g>
            </g>
        </svg>
    </div>

    <script>
        // 添加鼠标交互效果
        const panda = document.getElementById('panda');
        const svg = document.querySelector('svg');

        svg.addEventListener('mousemove', (e) => {
            const rect = svg.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width * 1200;
            const y = (e.clientY - rect.top) / rect.height * 800;

            // 熊猫眼睛跟随鼠标轻微移动
            const eyes = document.querySelectorAll('#panda circle[cx="-22"], #panda circle[cx="22"]');
            const offsetX = (x - 450) / 100;
            const offsetY = (y - 420) / 100;

            eyes.forEach((eye, index) => {
                const baseX = index === 0 ? -22 : 22;
                eye.setAttribute('cx', baseX + offsetX);
                eye.setAttribute('cy', -10 + offsetY);
            });
        });

        // 点击熊猫交互
        panda.addEventListener('click', () => {
            // 创建临时的跳跃动画
            const animate = document.createElementNS("http://www.w3.org/2000/svg", "animateTransform");
            animate.setAttribute("attributeName", "transform");
            animate.setAttribute("type", "translate");
            animate.setAttribute("values", "450,420; 450,350; 450,420");
            animate.setAttribute("dur", "0.5s");
            animate.setAttribute("fill", "freeze");
            animate.setAttribute("additive", "sum");

            panda.appendChild(animate);
            animate.beginElement();

            setTimeout(() => {
                panda.removeChild(animate);
            }, 500);
        });

        panda.style.cursor = 'pointer';
    </script>
</body>

</html>

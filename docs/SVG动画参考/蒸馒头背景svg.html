<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蒸馒头场景</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE4C4 50%, #FFD4A3 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 900px;
        }

        @keyframes steamRise {
            0% { 
                transform: translateY(0) scale(0.5); 
                opacity: 0.6; 
            }
            50% { 
                opacity: 0.3; 
            }
            100% { 
                transform: translateY(-120px) scale(1.2); 
                opacity: 0; 
            }
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .steam-particle {
            animation: steamRise 3s infinite ease-out;
        }

        .steam-particle:nth-child(2) { animation-delay: 0.8s; }
        .steam-particle:nth-child(3) { animation-delay: 1.6s; }

        .bun-group {
            animation: gentleFloat 4s ease-in-out infinite;
        }
        
        .bun-group:nth-child(2) { animation-delay: 0.5s; }
        .bun-group:nth-child(3) { animation-delay: 1s; }
    </style>
</head>
<body>
    <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
        <defs>
            <!-- 包子渐变 -->
            <radialGradient id="bunGradient" cx="40%" cy="30%">
                <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
                <stop offset="70%" style="stop-color:#F5F5DC;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#E8E4C9;stop-opacity:1" />
            </radialGradient>

            <!-- 竹笼渐变 -->
            <linearGradient id="bambooGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#E8C9A0;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#C49A6C;stop-opacity:1" />
            </linearGradient>

            <!-- 面粉渐变 -->
            <radialGradient id="flourGradient" cx="50%" cy="50%">
                <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
            </radialGradient>

            <!-- 蒸汽模糊 -->
            <filter id="steamBlur">
                <feGaussianBlur in="SourceGraphic" stdDeviation="6" />
            </filter>

            <!-- 投影 -->
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                <feOffset dx="0" dy="3" result="offsetblur"/>
                <feComponentTransfer>
                    <feFuncA type="linear" slope="0.2"/>
                </feComponentTransfer>
                <feMerge>
                    <feMergeNode/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- 背景桌面 -->
        <ellipse cx="400" cy="520" rx="600" ry="80" fill="#F5E6D3" opacity="0.6"/>

        <!-- 面粉袋子（右侧） -->
        <g transform="translate(620, 380)">
            <!-- 袋子阴影 -->
            <ellipse cx="0" cy="85" rx="70" ry="15" fill="#000" opacity="0.1"/>
            
            <!-- 袋子主体 -->
            <path d="M-60,-80 L-50,80 Q0,90 50,80 L60,-80 Q0,-90 -60,-80 Z" fill="#F4A460" stroke="#D2691E" stroke-width="2"/>
            
            <!-- 袋口褶皱 -->
            <path d="M-60,-80 Q-30,-70 0,-75 Q30,-70 60,-80" fill="#DEB887" stroke="#CD853F" stroke-width="1"/>
            
            <!-- 面粉字样 -->
            <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#8B4513">面粉</text>
            <text x="0" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#A0522D">Flour</text>
            
            <!-- 袋子上的面粉痕迹 -->
            <circle cx="-30" cy="-30" r="8" fill="#FFF" opacity="0.6"/>
            <circle cx="35" cy="50" r="6" fill="#FFF" opacity="0.5"/>
        </g>

        <!-- 勺子（左下角，装面粉） -->
        <g transform="translate(150, 480) rotate(-15)">
            <!-- 勺子阴影 -->
            <ellipse cx="20" cy="60" rx="40" ry="10" fill="#000" opacity="0.1"/>
            
            <!-- 勺柄 -->
            <rect x="-80" y="-5" width="100" height="12" rx="6" fill="#D2691E" stroke="#8B4513" stroke-width="1"/>
            
            <!-- 勺头 -->
            <ellipse cx="30" cy="0" rx="45" ry="30" fill="#CD853F" stroke="#8B4513" stroke-width="1"/>
            
            <!-- 勺子里的面粉堆 -->
            <ellipse cx="30" cy="-5" rx="35" ry="22" fill="url(#flourGradient)"/>
            
            <!-- 面粉细节 -->
            <circle cx="20" cy="-10" r="3" fill="#FFF" opacity="0.8"/>
            <circle cx="40" cy="0" r="2" fill="#FFF" opacity="0.9"/>
            <circle cx="25" cy="5" r="2.5" fill="#FFF" opacity="0.7"/>
        </g>

        <!-- 面团（桌子上的面团） -->
        <g transform="translate(280, 450)">
            <!-- 面团阴影 -->
            <ellipse cx="0" cy="35" rx="55" ry="12" fill="#000" opacity="0.1"/>
            
            <!-- 面团主体 -->
            <path d="M-45,10 Q-50,-20 -20,-30 Q10,-35 40,-25 Q55,-10 50,15 Q45,35 0,32 Q-40,30 -45,10 Z" 
                  fill="url(#bunGradient)" filter="url(#softShadow)"/>
            
            <!-- 面团纹理 -->
            <path d="M-20,-10 Q0,-5 20,-12" stroke="#E0E0E0" stroke-width="2" fill="none" opacity="0.5"/>
            <path d="M-15,5 Q5,10 25,3" stroke="#E0E0E0" stroke-width="2" fill="none" opacity="0.5"/>
        </g>

        <!-- 竹蒸笼（中间） -->
        <g transform="translate(450, 420)">
            <!-- 蒸笼阴影 -->
            <ellipse cx="0" cy="95" rx="110" ry="20" fill="#000" opacity="0.15"/>
            
            <!-- 蒸笼主体 -->
            <path d="M-100,0 L-95,80 Q-90,100 0,100 Q90,100 95,80 L100,0 Z" 
                  fill="url(#bambooGradient)" stroke="#A08060" stroke-width="2"/>
            
            <!-- 竹条纹理 -->
            <line x1="-98" y1="20" x2="98" y2="20" stroke="#A08060" stroke-width="1.5" opacity="0.4"/>
            <line x1="-96" y1="40" x2="96" y2="40" stroke="#A08060" stroke-width="1.5" opacity="0.4"/>
            <line x1="-95" y1="60" x2="95" y2="60" stroke="#A08060" stroke-width="1.5" opacity="0.4"/>
            <line x1="-93" y1="80" x2="93" y2="80" stroke="#A08060" stroke-width="1.5" opacity="0.4"/>
            
            <!-- 蒸笼里的包子 -->
            <g class="bun-group" transform="translate(-50, 30)">
                <circle cx="0" cy="0" r="28" fill="url(#bunGradient)"/>
                <!-- 包子褶皱 -->
                <path d="M-8,-8 L0,-15 L8,-8 M-15,0 L-8,-8 L-8,0 M8,0 L8,-8 L15,0" 
                      stroke="#E0E0E0" stroke-width="2" fill="none" stroke-linecap="round"/>
            </g>
            
            <g class="bun-group" transform="translate(0, 20)">
                <circle cx="0" cy="0" r="30" fill="url(#bunGradient)"/>
                <path d="M-8,-8 L0,-16 L8,-8 M-16,0 L-8,-8 L-8,0 M8,0 L8,-8 L16,0" 
                      stroke="#E0E0E0" stroke-width="2" fill="none" stroke-linecap="round"/>
            </g>
            
            <g class="bun-group" transform="translate(50, 30)">
                <circle cx="0" cy="0" r="28" fill="url(#bunGradient)"/>
                <path d="M-8,-8 L0,-15 L8,-8 M-15,0 L-8,-8 L-8,0 M8,0 L8,-8 L15,0" 
                      stroke="#E0E0E0" stroke-width="2" fill="none" stroke-linecap="round"/>
            </g>
            
            <g class="bun-group" transform="translate(-25, -10)">
                <circle cx="0" cy="0" r="29" fill="url(#bunGradient)"/>
                <path d="M-8,-8 L0,-16 L8,-8 M-16,0 L-8,-8 L-8,0 M8,0 L8,-8 L16,0" 
                      stroke="#E0E0E0" stroke-width="2" fill="none" stroke-linecap="round"/>
            </g>
            
            <g class="bun-group" transform="translate(25, -10)">
                <circle cx="0" cy="0" r="29" fill="url(#bunGradient)"/>
                <path d="M-8,-8 L0,-16 L8,-8 M-16,0 L-8,-8 L-8,0 M8,0 L8,-8 L16,0" 
                      stroke="#E0E0E0" stroke-width="2" fill="none" stroke-linecap="round"/>
            </g>

            <!-- 蒸笼盖子 -->
            <path d="M-110,0 Q-120,-60 0,-70 Q120,-60 110,0 Z" 
                  fill="url(#bambooGradient)" stroke="#A08060" stroke-width="2"/>
            
            <!-- 盖子顶部把手 -->
            <circle cx="0" cy="-70" r="12" fill="#C49A6C" stroke="#A08060" stroke-width="1.5"/>
            
            <!-- 蒸汽动画（从蒸笼冒出） -->
            <g transform="translate(0, -70)">
                <path class="steam-particle" d="M-20,0 Q-30,-30 -10,-60 T-20,-100" 
                      stroke="#FFF" stroke-width="12" fill="none" opacity="0.5" filter="url(#steamBlur)"/>
                <path class="steam-particle" d="M20,0 Q30,-30 10,-60 T20,-100" 
                      stroke="#FFF" stroke-width="10" fill="none" opacity="0.4" filter="url(#steamBlur)"/>
                <path class="steam-particle" d="M0,0 Q-10,-40 10,-80 T0,-120" 
                      stroke="#FFF" stroke-width="8" fill="none" opacity="0.4" filter="url(#steamBlur)"/>
            </g>
        </g>

        <!-- 散落的面粉颗粒（装饰） -->
        <circle cx="200" cy="520" r="3" fill="#FFF" opacity="0.7"/>
        <circle cx="220" cy="510" r="2" fill="#FFF" opacity="0.6"/>
        <circle cx="330" cy="500" r="2.5" fill="#FFF" opacity="0.5"/>
        <circle cx="580" cy="530" r="3" fill="#FFF" opacity="0.6"/>
        <circle cx="550" cy="540" r="2" fill="#FFF" opacity="0.7"/>
    </svg>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香蕉变黑的讨论</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 自定义字体和动画 */
        body {
            font-family: 'Noto Sans SC', sans-serif;
            /* 护眼的香蕉浅黄背景 */
            background-color: #fffbeb; 
            /* 稍深的黄色波点 */
            background-image: radial-gradient(#fde68a 15%, transparent 16%), radial-gradient(#fde68a 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
        }

        .cartoon-font {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        /* 消息气泡动画 */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }

        .message-enter {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 头像样式 */
        .avatar-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden">

    <!-- 手机外框容器 -->
    <div class="relative w-full h-full md:max-w-md md:h-[90vh] bg-white md:rounded-[3rem] shadow-2xl overflow-hidden border-8 border-gray-800 flex flex-col">
        
        <!-- 顶部刘海/状态栏 (仅装饰) -->
        <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-40 h-6 bg-gray-800 rounded-b-xl z-20 hidden md:block"></div>
        
        <!-- 头部导航栏 (暖黄色调) -->
        <header class="bg-amber-500 p-4 pt-6 md:pt-8 text-white flex items-center shadow-md z-10">
            <button class="mr-3 hover:bg-amber-600 p-1 rounded-full transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="flex-1">
                <h1 class="text-xl font-bold cartoon-font tracking-wide">妈妈</h1>
            </div>
            <button class="hover:bg-amber-600 p-1 rounded-full transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
            </button>
        </header>

        <!-- 聊天内容区域 -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 bg-amber-50/40 no-scrollbar relative">
            <!-- 消息会通过 JS 动态插入到这里 -->
            
            <!-- 正在输入提示 -->
            <div id="typing-indicator" class="hidden flex items-center space-x-2 p-2 w-fit ml-12">
                <div class="flex space-x-1">
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                </div>
            </div>
            
            <!-- 底部占位 -->
            <div class="h-4"></div>
        </div>

        <!-- 底部输入栏 (装饰用) -->
        <div class="bg-white p-3 border-t border-gray-200 flex items-center gap-2">
            <button class="text-gray-500 p-1 hover:text-amber-500 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
            <div class="flex-1 bg-gray-100 rounded-full h-10 px-4 flex items-center text-gray-400 text-sm">
                好的，我这就去查查！
            </div>
            <button class="bg-amber-500 text-white rounded-full p-2 w-10 h-10 flex items-center justify-center shadow-lg transform active:scale-95 transition hover:bg-amber-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>

        <!-- 重播按钮 -->
        <button onclick="restartChat()" class="absolute bottom-20 right-4 bg-white/80 backdrop-blur text-amber-500 p-2 rounded-full shadow-lg border border-amber-100 hover:bg-amber-50 transition z-20 group" title="重新播放">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:-rotate-180 transition duration-500"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/></svg>
        </button>
    </div>

    <script>
        // 定义角色数据 (图片头像占位)
        const characters = {
            ming: {
                name: '小明',
                color: 'bg-blue-100', // 截图中的浅蓝气泡
                arrowColor: 'bg-blue-100',
                textColor: 'text-gray-900',
                side: 'right',
                // 小明头像：请将 src="ming_avatar.png" 替换为你真实的图片路径
                avatar: `<img src="ming_avatar.png" alt="小明" class="w-full h-full object-cover bg-slate-100 flex items-center justify-center text-xs text-gray-400" />`
            },
            mom: {
                name: '妈妈',
                color: 'bg-blue-200', // 截图中略深一点的蓝色气泡
                arrowColor: 'bg-blue-200',
                textColor: 'text-gray-900',
                side: 'left',
                // 妈妈头像：请将 src="mom_avatar.png" 替换为你真实的图片路径
                avatar: `<img src="mom_avatar.png" alt="妈妈" class="w-full h-full object-cover bg-rose-50 flex items-center justify-center text-xs text-gray-400" />`
            }
        };

        // 聊天脚本 (根据截图提取)
        const script = [
            { id: 'mom', text: '回来啦？手里拿着香蕉，怎么不吃呀？' },
            { id: 'ming', text: '正准备吃呢，可拿起来一看，香蕉皮上好多黑斑。上次您买回来的那串，放了好几天都没这么快变黑。' },
            { id: 'mom', text: '我看看...还真是，好几块呢。是不是放太久了？还是被什么东西压到了？' },
            { id: 'ming', text: '没有啊，买回来就正常放在果盘里，也没磕着碰着。时间也不长，我剥开看了，里面果肉好好的，一点没坏。' },
            { id: 'mom', text: '果肉没事说明还没坏。不过皮黑得这么快，确实有点奇怪。' },
            { id: 'ming', text: '对啊，那这次香蕉为什么黑得这么快呢？' },
            { id: 'mom', text: '这我也不太清楚。要不你去查查资料，做个小实验？弄明白了也跟我说说。' }
        ];

        const chatContainer = document.getElementById('chat-container');
        const typingIndicator = document.getElementById('typing-indicator');
        let currentIndex = 0;
        let isTyping = false;

        function createMessageElement(messageData) {
            const char = characters[messageData.id];
            const isRight = char.side === 'right';
            
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full message-enter mb-6 ${isRight ? 'justify-end' : 'justify-start'}`;
            
            // 头像 HTML
            const avatarHtml = `
                <div class="flex flex-col items-center space-y-1 ${isRight ? 'order-2 ml-3' : 'mr-3'}">
                    <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-white avatar-shadow transform hover:scale-110 transition duration-300 bg-white">
                        ${char.avatar}
                    </div>
                    <span class="text-xs text-gray-500 font-medium">${char.name}</span>
                </div>
            `;

            // 气泡 HTML
            const bubbleHtml = `
                <div class="relative max-w-[70%] ${isRight ? 'order-1' : ''}">
                    <div class="${char.color} ${char.textColor} px-5 py-3 rounded-2xl shadow-sm text-[15px] leading-relaxed relative z-10 break-words border border-black/5">
                        ${messageData.text}
                    </div>
                    <!-- 气泡尖角 -->
                    <div class="absolute top-4 ${isRight ? `-right-2 ${char.arrowColor}` : `-left-2 ${char.arrowColor}`} w-4 h-4 transform rotate-45 z-0 rounded-sm"></div>
                </div>
            `;

            wrapper.innerHTML = avatarHtml + bubbleHtml;
            return wrapper;
        }

        async function showNextMessage() {
            if (currentIndex >= script.length) {
                // 对话结束后显示提示信息
                const tipDiv = document.createElement('div');
                tipDiv.className = 'text-center text-amber-600/60 text-sm py-4 message-enter animate-pulse';
                tipDiv.innerHTML = '✨ 滚动鼠标滚轮可以查看被遮挡的对话 ✨';
                chatContainer.insertBefore(tipDiv, typingIndicator);
                
                // 滚动到底部确保能看到提示
                chatContainer.scrollTo({
                    top: chatContainer.scrollHeight,
                    behavior: 'smooth'
                });
                return;
            }

            // 显示"正在输入"动画
            isTyping = true;
            typingIndicator.style.display = 'flex';
            // 确保正在输入时也能看到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // 模拟打字/阅读延迟 (根据字数动态调整，至少 1000ms)
            const delay = Math.min(Math.max(script[currentIndex].text.length * 80, 1000), 2000);
            
            await new Promise(r => setTimeout(r, delay));

            // 隐藏正在输入
            typingIndicator.style.display = 'none';
            isTyping = false;

            // 添加消息
            const msgElement = createMessageElement(script[currentIndex]);
            chatContainer.insertBefore(msgElement, typingIndicator);
            
            // 滚动到底部
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });

            currentIndex++;
            
            // 继续下一条
            setTimeout(showNextMessage, 500);
        }

        function restartChat() {
            const messages = chatContainer.querySelectorAll('.message-enter');
            messages.forEach(msg => msg.remove());
            currentIndex = 0;
            setTimeout(showNextMessage, 500);
        }

        // 页面加载完成后开始对话
        window.onload = () => {
            setTimeout(showNextMessage, 1000);
        };

    </script>
</body>
</html>

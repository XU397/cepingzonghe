<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案B - 卡片并排式</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8f4 100%);
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .title {
      font-size: 48px;
      font-weight: bold;
      color: #2e5c4f;
      margin-bottom: 12px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
    }

    .subtitle {
      font-size: 18px;
      color: #666;
      font-weight: 300;
    }

    .cardContainer {
      display: flex;
      gap: 40px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #4caf50, #81c784);
    }

    .cardIcon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    .cardTitle {
      font-size: 24px;
      color: #2e5c4f;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .cardContent {
      font-size: 16px;
      line-height: 2;
      color: #333;
      text-align: justify;
    }

    .imageCard {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .imageWrapper {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      margin-bottom: 16px;
    }

    .pvImage {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.3s ease;
    }

    .imageCard:hover .pvImage {
      transform: scale(1.05);
    }

    .imageCaption {
      text-align: center;
      color: #666;
      font-size: 15px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      width: 100%;
    }

    .highlightBox {
      background: linear-gradient(135deg, #fff8e1 0%, #fff9c4 100%);
      border: 2px solid #ffd54f;
      border-radius: 12px;
      padding: 24px 32px;
      margin-top: 20px;
    }

    .highlightText {
      font-size: 17px;
      color: #f57c00;
      font-weight: 500;
      line-height: 1.8;
      text-align: center;
    }

    .countdown {
      text-align: center;
      margin-top: 30px;
      color: #666;
      font-size: 18px;
      padding: 16px;
      background: white;
      border-radius: 50px;
      border: 2px solid #4caf50;
      display: inline-block;
      min-width: 300px;
    }

    .badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #ff9800;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">🌞 光伏治沙 🌿</h1>
      <p class="subtitle">探索绿色能源与生态修复的完美结合</p>
    </div>

    <div class="cardContainer">
      <!-- 文字卡片 -->
      <div class="card">
        <div class="badge">方案B</div>
        <span class="cardIcon">📖</span>
        <h2 class="cardTitle">项目背景</h2>
        <div class="cardContent">
          <p>2024年11月，中国库布齐沙漠通过"光伏项目"成功使6000多平方公里沙漠变为"能源绿洲"。</p>
          <br>
          <p>这一成就引发了同学们的思考：光伏板为何能有效减少水分蒸发，以实现保水治沙？他们推测，<strong>改变地表风速可能是关键机制</strong>。</p>
          <br>
          <p>为此，同学们设计了一项实地观测研究，以探究光伏板对风速的影响。</p>
        </div>
      </div>

      <!-- 图片卡片 -->
      <div class="card imageCard">
        <span class="cardIcon">🏜️</span>
        <h2 class="cardTitle">光伏治沙现场</h2>
        <div class="imageWrapper">
          <img
            src="https://via.placeholder.com/500x340/2e5c4f/ffffff?text=光伏治沙项目现场"
            alt="光伏治沙项目示意图"
            class="pvImage"
          />
        </div>
        <div class="imageCaption">
          📍 库布齐沙漠光伏项目 · 6000+平方公里能源绿洲
        </div>
      </div>
    </div>

    <div class="highlightBox">
      <p class="highlightText">
        🔬 <strong>研究假设：</strong>光伏板通过改变地表风速，减少水分蒸发，实现保水治沙效果
      </p>
    </div>

    <div style="text-align: center;">
      <div class="countdown">
        ⏱️ 请仔细阅读材料... 5s
      </div>
    </div>
  </div>
</body>
</html>

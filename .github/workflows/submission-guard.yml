name: 提交规范守卫 (Submission Guard)

on:
  # 被主 CI 复用调用；触发逻辑由上游 workflow 控制
  workflow_call:

jobs:
  submission-lint:
    name: 提交规范 Lint 检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行提交规范 Lint
        run: npm run lint:submission
        env:
          NODE_ENV: test

      - name: Lint 结果摘要
        if: failure()
        run: |
          echo "::error::提交规范 Lint 检查失败！"
          echo "::error::请检查以下违规项："
          echo "::error::1. 是否直接调用 '/stu/saveHcMark'"
          echo "::error::2. 是否手写 'M' 前缀页码"
          echo "::error::3. 是否直接 fetch('/stu/*')"
          echo "::error::4. 是否绕过 usePageSubmission Hook"
          echo "::notice::修复方法请参考：docs/submission-ci-checks.md"

  submission-format-test:
    name: 提交格式快照测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行提交格式测试
        run: npm run test:submission-format
        env:
          NODE_ENV: test

      - name: 测试失败摘要
        if: failure()
        run: |
          echo "::error::提交格式快照测试失败！"
          echo "::error::可能原因："
          echo "::error::1. pageNumber 格式不符合规范（必须为 'stepIndex.subPageNum'，如 '0.3'）"
          echo "::error::2. targetElement 缺少 'P{pageNumber}_' 前缀"
          echo "::error::3. 缺少最小事件集（page_enter, page_exit, next_click）"
          echo "::error::4. flow_context 注入缺失"
          echo "::notice::如需更新快照：npm run test:submission-format -- -u"

  submission-full-test:
    name: 提交服务完整测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行完整提交测试
        run: npm run test:submission
        env:
          NODE_ENV: test

      - name: 测试覆盖率报告
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "::notice::测试覆盖率报告已生成"
            cat coverage/coverage-summary.json
          fi

      - name: 测试失败摘要
        if: failure()
        run: |
          echo "::error::提交服务测试失败！"
          echo "::error::请检查："
          echo "::error::1. Schema 校验是否正确"
          echo "::error::2. 事件枚举是否完整"
          echo "::error::3. 前缀验证是否生效"
          echo "::notice::详细错误请查看上方日志"

  # 所有检查必须通过才能合并
  submission-guard-summary:
    name: 提交规范守卫总结
    runs-on: ubuntu-latest
    needs: [submission-lint, submission-format-test, submission-full-test]
    if: always()

    steps:
      - name: 检查所有守卫状态
        run: |
          if [[ "${{ needs.submission-lint.result }}" != "success" || \
                "${{ needs.submission-format-test.result }}" != "success" || \
                "${{ needs.submission-full-test.result }}" != "success" ]]; then
            echo "::error::❌ 提交规范守卫检查失败，禁止合并！"
            echo "::error::失败的检查："
            echo "::error::  - Lint: ${{ needs.submission-lint.result }}"
            echo "::error::  - 格式测试: ${{ needs.submission-format-test.result }}"
            echo "::error::  - 完整测试: ${{ needs.submission-full-test.result }}"
            echo "::notice::请修复上述问题后重新提交"
            exit 1
          else
            echo "::notice::✅ 所有提交规范守卫检查通过！"
            echo "::notice::可以安全合并"
          fi

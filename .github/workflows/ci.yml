name: 持续集成 (CI)

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # 代码质量检查
  lint:
    name: ESLint 代码检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行 ESLint
        run: npm run lint
        continue-on-error: true

      - name: Lint 结果
        if: failure()
        run: |
          echo "::warning::ESLint 检查发现问题，请修复后提交"

  # 单元测试
  test:
    name: 单元测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行测试
        run: npm test
        env:
          NODE_ENV: test

      - name: 测试失败处理
        if: failure()
        run: |
          echo "::error::单元测试失败，请修复后提交"

  # 构建检查
  build:
    name: 构建检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build
        env:
          NODE_ENV: production

      - name: 检查构建产物
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::构建产物目录不存在"
            exit 1
          fi
          echo "::notice::构建成功，产物目录大小："
          du -sh dist

      - name: 构建失败处理
        if: failure()
        run: |
          echo "::error::项目构建失败，请检查代码"

  # 提交规范守卫（调用专门的 workflow）
  submission-guard:
    name: 提交规范守卫
    uses: ./.github/workflows/submission-guard.yml

  # CI 总结
  ci-summary:
    name: CI 检查总结
    runs-on: ubuntu-latest
    needs: [lint, test, build, submission-guard]
    if: always()

    steps:
      - name: 检查所有 Job 状态
        run: |
          echo "::notice::CI 检查结果汇总："
          echo "::notice::  - Lint: ${{ needs.lint.result }}"
          echo "::notice::  - Test: ${{ needs.test.result }}"
          echo "::notice::  - Build: ${{ needs.build.result }}"

          if [[ "${{ needs.test.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::❌ CI 检查失败，禁止合并！"
            exit 1
          elif [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::warning::⚠️  Lint 检查有警告，建议修复"
            exit 0
          else
            echo "::notice::✅ 所有 CI 检查通过！"
          fi

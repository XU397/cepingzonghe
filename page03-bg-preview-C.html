<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案C - 图文交错式</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: #1a1a1a;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1600px;
      padding: 40px;
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
      position: relative;
      z-index: 2;
    }

    .title {
      font-size: 56px;
      font-weight: bold;
      background: linear-gradient(135deg, #4caf50 0%, #81c784 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      text-shadow: 0 0 40px rgba(76, 175, 80, 0.3);
    }

    .subtitle {
      font-size: 20px;
      color: #b0bec5;
      font-weight: 300;
    }

    .mainContent {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 60px;
      align-items: center;
      position: relative;
    }

    .textPanel {
      background: linear-gradient(135deg, rgba(46, 92, 79, 0.1) 0%, rgba(76, 175, 80, 0.05) 100%);
      border: 2px solid rgba(76, 175, 80, 0.3);
      border-radius: 20px;
      padding: 50px 40px;
      position: relative;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(76, 175, 80, 0.2);
    }

    .textPanel::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, #4caf50, #81c784);
      border-radius: 20px;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .textPanel:hover::before {
      opacity: 0.3;
    }

    .sectionIcon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    .sectionTitle {
      font-size: 28px;
      color: #4caf50;
      margin-bottom: 24px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .description {
      font-size: 17px;
      line-height: 2.2;
      color: #e0e0e0;
      text-align: justify;
      margin-bottom: 30px;
    }

    .description strong {
      color: #81c784;
      font-weight: 600;
    }

    .highlightBox {
      background: linear-gradient(135deg, rgba(255, 152, 0, 0.15) 0%, rgba(255, 193, 7, 0.1) 100%);
      border-left: 4px solid #ff9800;
      padding: 20px 24px;
      border-radius: 8px;
      margin-top: 24px;
    }

    .highlightText {
      font-size: 16px;
      color: #ffb74d;
      line-height: 1.8;
      font-weight: 500;
    }

    .imagePanel {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }

    .imagePanel:hover {
      transform: scale(1.02);
    }

    .pvImage {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(0.9);
      transition: filter 0.3s ease;
    }

    .imagePanel:hover .pvImage {
      filter: brightness(1);
    }

    .imageOverlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      padding: 30px;
      color: white;
    }

    .imageTitle {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .imageDesc {
      font-size: 15px;
      opacity: 0.9;
    }

    .countdown {
      text-align: center;
      margin-top: 50px;
      color: #81c784;
      font-size: 20px;
      padding: 20px 40px;
      background: rgba(46, 92, 79, 0.2);
      border: 2px solid rgba(76, 175, 80, 0.5);
      border-radius: 50px;
      display: inline-block;
      min-width: 350px;
      backdrop-filter: blur(10px);
    }

    .badge {
      position: absolute;
      top: 30px;
      right: 30px;
      background: linear-gradient(135deg, #ff9800, #f57c00);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
      z-index: 10;
    }

    .decorCircle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(76, 175, 80, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .circle1 {
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
    }

    .circle2 {
      width: 300px;
      height: 300px;
      bottom: -80px;
      left: -80px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">方案C</div>
    <div class="decorCircle circle1"></div>
    <div class="decorCircle circle2"></div>

    <div class="header">
      <h1 class="title">光伏治沙</h1>
      <p class="subtitle">Green Energy Meets Desert Restoration</p>
    </div>

    <div class="mainContent">
      <!-- 左侧文字面板 -->
      <div class="textPanel">
        <span class="sectionIcon">🌍</span>
        <h2 class="sectionTitle">PROJECT BACKGROUND</h2>
        <div class="description">
          2024年11月，中国库布齐沙漠通过"光伏项目"成功使6000多平方公里沙漠变为"能源绿洲"。这一成就引发了同学们的思考：光伏板为何能有效减少水分蒸发，以实现保水治沙？他们推测，<strong>改变地表风速可能是关键机制</strong>。为此，同学们设计了一项实地观测研究，以探究光伏板对风速的影响。
        </div>

        <div class="highlightBox">
          <p class="highlightText">
            💡 研究假设：光伏板通过影响风速，减少沙漠表面水分蒸发
          </p>
        </div>
      </div>

      <!-- 右侧图片面板 -->
      <div class="imagePanel">
        <img
          src="https://via.placeholder.com/700x480/2e5c4f/ffffff?text=PHOTOVOLTAIC+DESERT+PROJECT"
          alt="光伏治沙项目示意图"
          class="pvImage"
        />
        <div class="imageOverlay">
          <div class="imageTitle">📍 库布齐沙漠光伏项目</div>
          <div class="imageDesc">6000+ km² 沙漠转化为能源绿洲</div>
        </div>
      </div>
    </div>

    <div style="text-align: center;">
      <div class="countdown">
        ⏱️ 请仔细阅读研究背景 · 5s
      </div>
    </div>
  </div>
</body>
</html>
